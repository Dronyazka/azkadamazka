<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" href="pseudogammacalc.ico" type="image/x-icon" />
<title>Fibonorial Calculator</title>
<style>
:root{
  --bg:#0f172a; --card:#0b1220; --box:rgba(255,255,255,.03);
  --accent:#2563eb; --accent-dark:#1e3a8a; --text:#e6eef8;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
.page{min-height:100%;padding:32px;display:flex;flex-direction:column;align-items:center;gap:14px;background:var(--bg);}
.page-title{margin:0;font-size:30px;line-height:1.2;text-align:center;font-weight:800;}
.op-row{width:100%;max-width:900px;}
.op-card{width:100%;background:var(--card);padding:12px;border-radius:12px;display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;}
.op-label{text-align:center;font-weight:700;opacity:.9;}
.op-controls{width:100%;position:relative;display:flex;align-items:center;justify-content:center;}
.view-toggle{width:44px;height:44px;border:none;border-radius:10px;background:var(--accent);color:white;font-size:22px;font-weight:800;cursor:pointer;position:absolute;right:0;top:50%;transform:translateY(-50%);}
.view-toggle.left{left:0;right:auto;}
.opgroup{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;}
.opgroup button{background:var(--accent);border:none;color:white;height:44px;padding:0 16px;font-weight:700;border-radius:8px;cursor:pointer;}
.opgroup button.active{background:var(--accent-dark);}
.card{width:100%;max-width:900px;background:var(--card);padding:18px;border-radius:12px;box-sizing:border-box;}
.inputs-row{display:flex;gap:10px;width:100%;flex-wrap:nowrap;} 
.inputs-row.one input{width:100%;}
.inputs-row.two input{width:50%;}
input{height:44px;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:var(--box);color:var(--text);font-size:16px;}
input::placeholder{color:rgba(230,238,248,.45);}
.compute{margin-top:12px;display:flex;justify-content:center;}
.compute button{padding:10px 18px;background:var(--accent);color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;}
.box{margin-top:14px;padding:12px;border-radius:8px;background:var(--box);}
.label{font-weight:700;margin-bottom:6px;}
.out{font-family:monospace;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;}
#errorBox{display:none;margin-top:12px;background:#2b3440;padding:10px;border-radius:8px;color:#ffdede;}
@media(max-width:700px){ .page{padding:8px;} .op-row,.op-card,.card{max-width:none;width:100%;} .inputs-row{flex-direction:row;} .inputs-row.two input{width:50%; min-width:0;} }
</style>
</head>
<body>
<div class="page">
  <h1 class="page-title">Fibonorial Calculator</h1>
  <div class="op-row">
    <div class="op-card">
      <div id="opLabel" class="op-label">Combinatorics</div>
      <div class="op-controls">
        <div class="opgroup">
          <button id="btnFact" class="active" type="button"><i>n</i>!</button>
          <button id="btnCr" type="button"><i>n</i>C<i>r</i></button>
          <button id="btnPr" type="button"><i>n</i>P<i>r</i></button>
        </div>
        <button id="viewToggle" class="view-toggle" type="button" aria-label="Toggle operation view">&gt;</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="inputsRow" class="inputs-row one">
      <input id="xinput" placeholder="" aria-label="x" type="text">
      <input id="yinput" placeholder="" aria-label="y" type="text" />
    </div>

    <div class="compute">
      <button id="compute" type="button">Compute</button>
    </div>

    <div class="box"><div class="label">Factorial</div><div id="outGamma" class="out">—</div></div>
    <div class="box"><div class="label">Fibonorial</div><div id="outHad" class="out">—</div></div>

    <pre id="errorBox"></pre>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
<script>

const btnFact = document.getElementById('btnFact');
const btnPr   = document.getElementById('btnPr');
const btnCr   = document.getElementById('btnCr');
const opLabel = document.getElementById('opLabel');
const viewToggle = document.getElementById('viewToggle');
const inputsRow = document.getElementById('inputsRow');
const xinput = document.getElementById('xinput');
const yinput = document.getElementById('yinput');
const computeBtn = document.getElementById('compute');
const outGamma = document.getElementById('outGamma');
const outHad = document.getElementById('outHad');
const errorBox = document.getElementById('errorBox');

let operation = 'fact';
let viewMode = 'comb';
let secondaryBtnWidthPx = null;

function measureFpSecondaryWidth(){
  const prev = btnPr.innerHTML;
  btnPr.innerHTML = '(<i>x</i>)<sub><i>n</i></sub>';
  const w = Math.ceil(btnPr.getBoundingClientRect().width);
  btnPr.innerHTML = prev;
  return w;
}

function applySecondaryButtonWidth(){
  if(secondaryBtnWidthPx === null){
    secondaryBtnWidthPx = measureFpSecondaryWidth();
  }
  btnCr.style.width = `${secondaryBtnWidthPx}px`;
  btnPr.style.width = `${secondaryBtnWidthPx}px`;
}

function updateViewUI(){
  if(viewMode === 'comb'){
    opLabel.textContent = 'Combinatorics';
    btnFact.innerHTML = '<i>n</i>!';
    btnCr.innerHTML = '<i>n</i>C<i>r</i>';
    btnPr.innerHTML = '<i>n</i>P<i>r</i>';
    viewToggle.textContent = '>';
    viewToggle.classList.remove('left');
  } else {
    opLabel.textContent = 'Factorial Powers';
    btnFact.innerHTML = '<i>n</i>!';
    btnCr.innerHTML = '(<i>x</i>)<sub><i>n</i></sub>';
    btnPr.innerHTML = '<i>x</i><sup>(<i>n</i>)</sup>';
    viewToggle.textContent = '<';
    viewToggle.classList.add('left');
  }
  applySecondaryButtonWidth();
}

function setMode(mode){
  operation = mode;
  btnFact.classList.toggle('active', mode === 'fact');
  btnPr.classList.toggle('active', mode === 'pr');
  btnCr.classList.toggle('active', mode === 'cr' || mode === 'fp_fall');
  if(mode === 'fact'){
    inputsRow.className = 'inputs-row one';
    yinput.style.display = 'none'; yinput.disabled = true; yinput.value = '';
  } else {
    inputsRow.className = 'inputs-row two';
    yinput.style.display = ''; yinput.disabled = false;
  }
}

function toggleViewMode(){
  if(viewMode === 'comb'){
    viewMode = 'fp';
    if(operation === 'cr') operation = 'fp_fall';
  } else {
    viewMode = 'comb';
    if(operation === 'fp_fall') operation = 'cr';
  }
  updateViewUI();
  setMode(operation);
}

btnFact.addEventListener('click', ()=> setMode('fact'));
btnPr.addEventListener('click', ()=> setMode('pr'));
btnCr.addEventListener('click', ()=> setMode(viewMode === 'comb' ? 'cr' : 'fp_fall'));
viewToggle.addEventListener('click', toggleViewMode);
updateViewUI();
setMode('fact');

function toHyphenMinus(s){ return s.replace(/−/g, '-'); }


const pythonComputeModule = `
from mpmath import mp, mpf, mpc, qgamma
mp.dps = 256

PHI = (1 + mp.sqrt(5)) / 2
QF = -PHI**-2

DECIMAL_PLACES = 30
SCI_SIG_DIGITS = 30
LOWER_FIXED_BOUND = mp.mpf('1e-10')
UPPER_FIXED_BOUND = mp.mpf('1e15')
INT_TOL = mp.power(10, -20)
ROUND_SCALE = mp.power(10, DECIMAL_PLACES)
OVERFLOW_BOUND = mp.mpf('1e1000')
UNDERFLOW_BOUND = mp.mpf('1e-1000')

def _use_fixed(abs_val):
    return abs_val > LOWER_FIXED_BOUND and abs_val < UPPER_FIXED_BOUND

def _normalize_zero_string(s):
    try:
        if mp.mpf(s) == 0:
            return '0'
    except Exception:
        pass
    return s

def _round_decimal_places(z):
    return mp.nint(z * ROUND_SCALE) / ROUND_SCALE

def _fmt_sci(z):
    s = mp.nstr(z, SCI_SIG_DIGITS, min_fixed=0, max_fixed=0)
    return _normalize_zero_string(s)

def _sci_to_fixed(s):
    t = s.strip()
    if 'e' not in t and 'E' not in t:
        return t
    sign = ''
    if t.startswith(('+', '-')):
        sign = '-' if t[0] == '-' else ''
        t = t[1:]
    mant, exp_s = t.lower().split('e', 1)
    exp = int(exp_s)
    if '.' in mant:
        a, b = mant.split('.', 1)
    else:
        a, b = mant, ''
    digits = (a + b).lstrip('0')
    if digits == '':
        return '0'
    dec_pos = len(a) + exp
    if dec_pos <= 0:
        out = '0.' + ('0' * (-dec_pos)) + digits
    elif dec_pos >= len(digits):
        out = digits + ('0' * (dec_pos - len(digits)))
    else:
        out = digits[:dec_pos] + '.' + digits[dec_pos:]
    if sign:
        out = sign + out
    return out

def _fmt_fixed(z):
    s = mp.nstr(_round_decimal_places(z), DECIMAL_PLACES + 5, min_fixed=0)
    s = _sci_to_fixed(s)
    if '.' in s:
        s = s.rstrip('0').rstrip('.')
    if s in ('', '-0', '+0'):
        return '0'
    return _normalize_zero_string(s)

def fmt(z):
    try:
        if mp.isinf(z) or abs(z) >= OVERFLOW_BOUND:
            return '∞̃'
    except Exception:
        return '∞̃'

    try:
        if z == 0:
            return '0'
    except Exception:
        pass

    if isinstance(z, mpc):
        re = mp.re(z); im = mp.im(z)
        if abs(im) < mp.mpf('1e-25'):
            z = re
        else:
            re_abs = abs(re)
            im_abs = abs(im)
            re_s = '0' if re_abs < UNDERFLOW_BOUND else (_fmt_fixed(re) if (re_abs == 0 or _use_fixed(re_abs)) else _fmt_sci(re))
            im_s = '0' if im_abs < UNDERFLOW_BOUND else (_fmt_fixed(im_abs) if (im_abs == 0 or _use_fixed(im_abs)) else _fmt_sci(im_abs))
            sign = ' + ' if mp.sign(im) >= 0 else ' - '
            return f"{re_s}{sign}{im_s}i"

    try:
        abs_z = abs(z)
    except Exception:
        abs_z = None

    try:
        nearest = int(mp.floor(z + mp.mpf('0.5')))
        if abs_z is not None and abs_z >= 1 and abs(z - nearest) <= INT_TOL and abs_z < UPPER_FIXED_BOUND:
            return str(int(nearest))
    except Exception:
        pass

    if abs_z is None:
        return _fmt_fixed(z)
    if abs_z < UNDERFLOW_BOUND:
        return '0'
    return _fmt_fixed(z) if _use_fixed(abs_z) else _fmt_sci(z)

def parse_input(s):
    s = s.strip()
    if s == '':
        raise ValueError('EMPTY_INPUT')
    if ('i' not in s) and ('j' not in s):
        try:
            return mp.mpf(s)
        except Exception:
            pass
    try:
        return mpc(s.replace('i','j'))
    except Exception:
        raise ValueError('NAN_INPUT')

def is_exact_real_integer(x):
    if isinstance(x, mpc):
        return False
    try:
        r = mp.re(x)
        return r == mp.mpf(int(r))
    except Exception:
        return False

def _int_if_real_integer(x):
    if (not isinstance(x, mpc)) and is_exact_real_integer(x):
        return int(mp.re(x))
    return None

def qpochhammer(a, q, n):
    if hasattr(mp, 'qpoch'):
        return mp.qpoch(a, q, n)
    if hasattr(mp, 'qp'):
        return mp.qp(a, q, n)
    raise ValueError('q-Pochhammer not available')

def f_factorial(x):
    try:
        return mp.gamma(x + 1)
    except Exception:
        return mp.mpf('inf')

def f_fibonorial(x):
    try:
        return PHI**((x * (x - 1))/2) * qgamma(x + 1, QF)
    except Exception:
        return mp.mpf('inf')

def fib_ncr(n, r):
    ni = _int_if_real_integer(n)
    ri = _int_if_real_integer(r)
    if ni is not None and ri is not None:
        if ni >= 0 and ri < 0:
            return mp.mpf('0')
        if ni >= 0 and ri > ni:
            return mp.mpf('0')
        if ni < 0 and ni < ri < 0:
            return mp.mpf('0')
        if ni < 0:
            m = -ni
            return ((-1)**(m*ri + (ri*(ri+1))//2)) * (PHI**(ri*(m-1))) * qgamma(m + ri, QF) / (qgamma(ri + 1, QF) * qgamma(m, QF))
    return (PHI**(r*(n-r))) * qgamma(n + 1, QF) / (qgamma(r + 1, QF) * qgamma(n - r + 1, QF))

def fib_fall(x, n):
    return PHI**((n * (2*x + n - 3))/2) * qpochhammer(x, QF, n)

def fib_pr(n, k):
    ni = _int_if_real_integer(n)
    ki = _int_if_real_integer(k)
    if ni is not None and ki is not None:
        if ki <= ni < 0:
            return mp.mpf('inf')
        if 0 <= ni < ki:
            return mp.mpf('0')
        if ni < 0:
            m = -ni
            return ((-1)**(m*ki + (ki + 1)/2)) * (PHI**(m*ki + ki/2 - ki)) * qgamma(m + ki, QF) / qgamma(ni, QF)
    return (PHI**(n*k - k*(k+1)/2)) * qgamma(n + 1, QF) / qgamma(n - k + 1, QF)

def compute_values(x_str, y_str, op):
    try:
        x = parse_input(x_str)
    except Exception as e:
        code = 'EMPTY_INPUT' if str(e) == 'EMPTY_INPUT' else 'NAN_INPUT'
        return (code, code, False)

    if op in ('pr', 'cr', 'fp_fall'):
        try:
            y = parse_input(y_str)
        except Exception as e:
            code = 'EMPTY_INPUT' if str(e) == 'EMPTY_INPUT' else 'NAN_INPUT'
            return (code, code, False)
    else:
        y = None

    is_pos = (not isinstance(x, mpc)) and (mp.re(x) > 0)

    try:
        if op == 'fact':
            a = f_factorial(x)
            b = f_fibonorial(x)
        elif op == 'cr':
            a = mp.binomial(x, y)
            b = fib_ncr(x, y)
        elif op == 'pr':
            a = mp.ff(x, y)
            b = fib_pr(x, y)
        elif op == 'fp_fall':
            a = mp.ff(x, y)
            b = fib_fall(x, y)
        else:
            a = mp.mpf('inf'); b = mp.mpf('inf')
    except Exception:
        a = mp.mpf('inf'); b = mp.mpf('inf')

    return (fmt(a), fmt(b), bool(is_pos))`


let pyodideReady = false;
async function initPy(){
  try{
    computeBtn.disabled = true;
    computeBtn.textContent = 'Loading…';
    window.pyodide = await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.23.4/full/'});
    await pyodide.loadPackage('micropip');
    await pyodide.runPythonAsync(`import micropip\nawait micropip.install('mpmath')`);
    await pyodide.runPythonAsync(pythonComputeModule);
    pyodideReady = true;
    computeBtn.disabled = false;
    computeBtn.textContent = 'Compute';
  } catch(err){
    console.error('Pyodide init failed', err);
    pyodideReady = false;
    computeBtn.disabled = false;
    computeBtn.textContent = 'Compute';
  }
}
initPy();


computeBtn.addEventListener('click', compute);
xinput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') compute(); });
yinput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') compute(); });

async function compute(){
  errorBox.style.display = 'none';
  outGamma.textContent = '…'; outHad.textContent = '…';

  if(!pyodideReady){
    const msg = 'Error: Engine is not ready';
    outGamma.textContent = msg; outHad.textContent = msg;
    return;
  }

  const sx = xinput.value.trim();
  const sy = yinput.value.trim();

  if(sx === ''){
    const err = 'Error: Incomplete expression';
    outGamma.textContent = err; outHad.textContent = err;
    return;
  }
  if((operation === 'pr' || operation === 'cr' || operation === 'fp_fall') && sy === ''){
    const err = 'Error: Incomplete expression';
    outGamma.textContent = err; outHad.textContent = err;
    return;
  }

  computeBtn.disabled = true;
  computeBtn.textContent = 'Computing…';
  try{
    pyodide.globals.set('x_in', sx);
    pyodide.globals.set('y_in', sy);
    pyodide.globals.set('op_in', operation);

    const result = await pyodide.runPythonAsync(`compute_values(x_in, y_in if y_in is not None else '', op_in)`);

    const [gRaw, hRaw, isPos] = result;

    function mapOut(raw, isPos){
      if(raw === 'EMPTY_INPUT') return 'Error: Incomplete expression';
      if(raw === 'NAN_INPUT') return 'Error: Input is not a number';
      if(raw === 'ERROR') return 'Error: Computation failed';
      if(raw === '∞̃' && isPos === true) return 'Error: Result is too big';
      if(typeof raw === 'string'){
        const s = toHyphenMinus(raw).trim();
        if (/^[+-]?0(?:\.0+)?(?:e[+-]?\d+)?$/i.test(s)) return '0';
        return s;
      }
      return String(raw);
    }

    outGamma.textContent = mapOut(gRaw, isPos);
    outHad.textContent = mapOut(hRaw, isPos);

  } catch(err){
    console.error('Compute failed', err);
    const msg = 'Error: Computation failed';
    outGamma.textContent = msg; outHad.textContent = msg;
  } finally {
    computeBtn.disabled = false;
    computeBtn.textContent = 'Compute';
    try{ pyodide.globals.del('x_in'); pyodide.globals.del('y_in'); pyodide.globals.del('op_in'); } catch(e){}
  }
}
</script>
</body>
</html>
